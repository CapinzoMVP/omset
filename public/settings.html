<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings Omset Olsera</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand bg-white">
    <div class="container page-shell">
      <a class="navbar-brand fw-bold" href="/">Omset Olsera</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link active" href="/settings.html">Settings</a>
      </div>
    </div>
  </nav>

  <main class="container page-shell py-4">
    <div id="settingsStatus" class="status-text small text-muted mb-3"></div>

    <section class="panel p-3 mb-4">
      <h1 class="h5 mb-3">Token Olsera</h1>
      <div class="row g-3 align-items-end">
        <div class="col-12 col-lg-8">
          <label for="olseraToken" class="form-label">Token Manual / Worker</label>
          <input id="olseraToken" class="form-control" autocomplete="off">
          <div id="tokenStatus" class="small text-muted mt-2">Status token belum dimuat.</div>
        </div>
        <div class="col-12 col-md-6 col-lg-2">
          <label for="workerKey" class="form-label">Worker Key</label>
          <input id="workerKey" class="form-control" autocomplete="off">
        </div>
        <div class="col-12 col-md-6 col-lg-2">
          <button id="saveTokenButton" class="btn btn-primary w-100" type="button">Simpan Token</button>
        </div>
      </div>
    </section>

    <section class="panel p-3 mb-4">
      <h2 class="h5 mb-3">Manajemen Kategori</h2>
      <form id="categoryForm" class="row g-3 align-items-end mb-3">
        <input id="categoryId" type="hidden">
        <div class="col-12 col-md-2">
          <label for="groupId" class="form-label">Olsera ID</label>
          <input id="groupId" class="form-control" required>
        </div>
        <div class="col-12 col-md-3">
          <label for="categoryName" class="form-label">Kategori</label>
          <input id="categoryName" class="form-control" required>
        </div>
        <div class="col-6 col-md-2">
          <label for="productionArea" class="form-label">Produksi</label>
          <select id="productionArea" class="form-select" required>
            <option value="Bar">Bar</option>
            <option value="Dapur">Dapur</option>
          </select>
        </div>
        <div class="col-6 col-md-2">
          <label for="itemType" class="form-label">Tipe</label>
          <select id="itemType" class="form-select" required>
            <option value="Minuman">Minuman</option>
            <option value="Makanan">Makanan</option>
          </select>
        </div>
        <div class="col-12 col-md-3 d-flex gap-2">
          <button class="btn btn-primary flex-fill" type="submit">Simpan</button>
          <button id="resetCategoryButton" class="btn btn-outline-secondary" type="button">Reset</button>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th>Olsera ID</th>
              <th>Kategori</th>
              <th>Produksi</th>
              <th>Tipe</th>
              <th class="text-end">Aksi</th>
            </tr>
          </thead>
          <tbody id="categoryRows"></tbody>
        </table>
      </div>
    </section>

    <section class="panel p-3">
      <h2 class="h5 mb-3">Manajemen Kasir Billiard</h2>
      <form id="cashierForm" class="row g-3 align-items-end mb-3">
        <div class="col-12 col-md-8">
          <label for="cashierName" class="form-label">Nama Kasir</label>
          <input id="cashierName" class="form-control" required>
        </div>
        <div class="col-12 col-md-4">
          <button class="btn btn-primary w-100" type="submit">Tambah Kasir</button>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th>Nama Kasir</th>
              <th class="text-end">Aksi</th>
            </tr>
          </thead>
          <tbody id="cashierRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/settings.js"></script>
</body>
</html>
